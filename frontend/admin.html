<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard - HITL</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link href="css/style.css" rel="stylesheet" />
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-dark bg-dark sticky-top">
    <div class="container-fluid">
      <span class="navbar-brand"><i class="bi bi-shield-lock me-2"></i>HITL Admin</span>
      <div class="d-flex align-items-center gap-3">
        <span class="text-light small" id="navUser"></span>
        <button class="btn btn-outline-light btn-sm" id="logoutBtn"><i class="bi bi-box-arrow-right me-1"></i>Logout</button>
      </div>
    </div>
  </nav>

  <div class="container-fluid px-4 py-3">

    <!-- ── Summary Cards ── -->
    <div class="row g-3 mb-4" id="summaryCards">
      <div class="col-6 col-lg-3">
        <div class="card border-0 shadow-sm stat-card stat-pending">
          <div class="card-body text-center py-3">
            <i class="bi bi-hourglass-split fs-4 d-block mb-1"></i>
            <div class="fs-2 fw-bold" id="countPending">-</div>
            <small class="text-uppercase fw-semibold">Pending</small>
          </div>
        </div>
      </div>
      <div class="col-6 col-lg-3">
        <div class="card border-0 shadow-sm stat-card stat-approved">
          <div class="card-body text-center py-3">
            <i class="bi bi-check-circle fs-4 d-block mb-1"></i>
            <div class="fs-2 fw-bold" id="countApproved">-</div>
            <small class="text-uppercase fw-semibold">Approved</small>
          </div>
        </div>
      </div>
      <div class="col-6 col-lg-3">
        <div class="card border-0 shadow-sm stat-card stat-rejected">
          <div class="card-body text-center py-3">
            <i class="bi bi-x-circle fs-4 d-block mb-1"></i>
            <div class="fs-2 fw-bold" id="countRejected">-</div>
            <small class="text-uppercase fw-semibold">Rejected</small>
          </div>
        </div>
      </div>
      <div class="col-6 col-lg-3">
        <div class="card border-0 shadow-sm stat-card stat-completed">
          <div class="card-body text-center py-3">
            <i class="bi bi-flag fs-4 d-block mb-1"></i>
            <div class="fs-2 fw-bold" id="countCompleted">-</div>
            <small class="text-uppercase fw-semibold">Completed</small>
          </div>
        </div>
      </div>
    </div>

    <!-- ── Tabs ── -->
    <ul class="nav nav-pills nav-fill mb-3 bg-white rounded shadow-sm p-1" id="adminTabs" role="tablist">
      <li class="nav-item" role="presentation">
        <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#overviewPane" type="button"><i class="bi bi-grid me-1"></i>Overview</button>
      </li>
      <li class="nav-item" role="presentation">
        <button class="nav-link" data-bs-toggle="tab" data-bs-target="#userDetailsPane" type="button"><i class="bi bi-person-lines-fill me-1"></i>User Details</button>
      </li>
      <li class="nav-item" role="presentation">
        <button class="nav-link" data-bs-toggle="tab" data-bs-target="#approvePane" type="button"><i class="bi bi-clipboard-check me-1"></i>Approve Tasks</button>
      </li>
    </ul>

    <div class="tab-content">

      <!-- ═══ Tab 1: Overview ═══ -->
      <div class="tab-pane fade show active" id="overviewPane" role="tabpanel">
        <div class="card border-0 shadow-sm">
          <div class="card-body">
            <div class="row align-items-center mb-3">
              <div class="col-md-4">
                <div class="input-group input-group-sm">
                  <span class="input-group-text"><i class="bi bi-search"></i></span>
                  <input type="text" class="form-control" id="overviewUserSearch" placeholder="Search user..." />
                </div>
              </div>
              <div class="col-md-4">
                <select class="form-select form-select-sm" id="overviewUserSelect">
                  <option value="">-- Select a user --</option>
                </select>
              </div>
            </div>
            <div id="overviewTableSection" style="display:none">
              <h6 class="fw-semibold mb-2" id="overviewUserLabel"></h6>
              <div class="scrollable-table">
                <table class="table table-bordered table-hover table-sm mb-0">
                  <thead class="table-light">
                    <tr>
                      <th>Username</th>
                      <th class="text-center">Pending</th>
                      <th class="text-center">Approved</th>
                      <th class="text-center">Rejected</th>
                      <th class="text-center">Completed</th>
                      <th class="text-center">Total</th>
                    </tr>
                  </thead>
                  <tbody id="overviewBody"></tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- ═══ Tab 2: User Details ═══ -->
      <div class="tab-pane fade" id="userDetailsPane" role="tabpanel">
        <div class="card border-0 shadow-sm">
          <div class="card-body">
            <div class="row align-items-center mb-3">
              <div class="col-md-4">
                <div class="input-group input-group-sm">
                  <span class="input-group-text"><i class="bi bi-search"></i></span>
                  <input type="text" class="form-control" id="detailsUserSearch" placeholder="Search user..." />
                </div>
              </div>
              <div class="col-md-4">
                <select class="form-select form-select-sm" id="detailsUserSelect">
                  <option value="">-- Select a user --</option>
                </select>
              </div>
            </div>

            <div id="detailsSection" style="display:none">
              <h6 class="fw-semibold" id="detailsUserLabel"></h6>

              <!-- Agent Runs -->
              <p class="text-muted small mb-1 mt-3"><i class="bi bi-play-circle me-1"></i>Agent Runs</p>
              <div class="scrollable-table mb-4">
                <table class="table table-bordered table-hover table-sm mb-0">
                  <thead class="table-light">
                    <tr>
                      <th>Run ID</th>
                      <th>Message</th>
                      <th>Created</th>
                    </tr>
                  </thead>
                  <tbody id="detailsRunsBody"></tbody>
                </table>
              </div>

              <!-- HITL Tasks -->
              <div class="d-flex align-items-center gap-2 mb-2">
                <p class="text-muted small mb-0"><i class="bi bi-list-task me-1"></i>HITL Tasks</p>
                <select class="form-select form-select-sm" style="width:140px" id="detailsStatusFilter">
                  <option value="">All Statuses</option>
                  <option value="pending">Pending</option>
                  <option value="approved">Approved</option>
                  <option value="rejected">Rejected</option>
                  <option value="cancelled">Cancelled</option>
                  <option value="completed">Completed</option>
                </select>
              </div>
              <div class="scrollable-table">
                <table class="table table-bordered table-hover table-sm mb-0">
                  <thead class="table-light">
                    <tr>
                      <th>Task ID</th>
                      <th>Task Name</th>
                      <th>Description</th>
                      <th>Args</th>
                      <th>Status</th>
                      <th>Agent Run</th>
                      <th>Output</th>
                      <th>Created</th>
                      <th>Updated</th>
                    </tr>
                  </thead>
                  <tbody id="detailsTasksBody"></tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- ═══ Tab 3: Approve Tasks ═══ -->
      <div class="tab-pane fade" id="approvePane" role="tabpanel">
        <div class="card border-0 shadow-sm">
          <div class="card-body">
            <div class="row align-items-center mb-3">
              <div class="col-md-4">
                <div class="input-group input-group-sm">
                  <span class="input-group-text"><i class="bi bi-search"></i></span>
                  <input type="text" class="form-control" id="approveUserSearch" placeholder="Search user..." />
                </div>
              </div>
              <div class="col-md-4">
                <select class="form-select form-select-sm" id="approveUserSelect">
                  <option value="">-- Select a user --</option>
                </select>
              </div>
              <div class="col-auto">
                <button class="btn btn-sm btn-outline-primary" id="approveRefreshBtn"><i class="bi bi-arrow-clockwise me-1"></i>Refresh</button>
              </div>
            </div>

            <div id="approveSection" style="display:none">
              <h6 class="fw-semibold mb-2" id="approveUserLabel"></h6>
              <div class="scrollable-table">
                <table class="table table-bordered table-hover table-sm mb-0">
                  <thead class="table-light">
                    <tr>
                      <th>Task ID</th>
                      <th>Task Name</th>
                      <th>Description</th>
                      <th>Args</th>
                      <th>Agent Run</th>
                      <th>Created</th>
                      <th class="text-center">Actions</th>
                    </tr>
                  </thead>
                  <tbody id="approveBody"></tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      </div>

    </div><!-- /tab-content -->
  </div>

  <!-- Toast -->
  <div class="toast-container">
    <div id="toast" class="toast align-items-center border-0" role="alert">
      <div class="d-flex">
        <div class="toast-body" id="toastBody"></div>
        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/env.js"></script>
  <script src="js/api.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
