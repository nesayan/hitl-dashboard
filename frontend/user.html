<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>User Dashboard - HITL</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link href="css/style.css" rel="stylesheet" />
</head>
<body>
  <nav class="navbar navbar-dark bg-secondary mb-3">
    <div class="container-fluid">
      <span class="navbar-brand"><i class="bi bi-person-circle me-2"></i>HITL Dashboard</span>
      <div class="d-flex align-items-center gap-3">
        <span class="text-light" id="navUser"></span>
        <button class="btn btn-outline-light btn-sm" id="logoutBtn">Logout</button>
      </div>
    </div>
  </nav>

  <div class="container-fluid px-4">
    <!-- Nav pills -->
    <ul class="nav nav-pills mb-3">
      <li class="nav-item">
        <button class="nav-link active" data-bs-toggle="pill" data-bs-target="#tabTasks">
          <i class="bi bi-list-task me-1"></i>My Tasks
        </button>
      </li>
      <li class="nav-item">
        <button class="nav-link" data-bs-toggle="pill" data-bs-target="#tabChat">
          <i class="bi bi-chat-dots me-1"></i>Chat
        </button>
      </li>
    </ul>

    <div class="tab-content">
      <!-- Tasks Tab -->
      <div class="tab-pane fade show active" id="tabTasks">
        <div class="card shadow-sm">
          <div class="card-body">
            <div class="d-flex align-items-center gap-2 mb-3">
              <select class="form-select form-select-sm" id="statusFilter" style="width:auto;">
                <option value="">All Statuses</option>
                <option value="pending">Pending</option>
                <option value="approved">Approved</option>
                <option value="rejected">Rejected</option>
                <option value="cancelled">Cancelled</option>
                <option value="completed">Completed</option>
              </select>
              <button class="btn btn-sm btn-outline-primary" id="refreshBtn">
                <i class="bi bi-arrow-clockwise"></i> Refresh
              </button>
            </div>
            <div class="scrollable-table">
              <table class="table table-bordered table-hover table-sm mb-0">
                <thead>
                  <tr>
                    <th>Task Name</th>
                    <th>Description</th>
                    <th>Args</th>
                    <th>Status</th>
                    <th>Output</th>
                    <th>Created</th>
                    <th>Updated</th>
                    <th>Actions</th>
                  </tr>
                </thead>
                <tbody id="tasksBody">
                  <tr><td colspan="8" class="text-center text-muted">Loading...</td></tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>

      <!-- Chat Tab -->
      <div class="tab-pane fade" id="tabChat">
        <div class="card shadow-sm chat-card">
          <div class="chat-messages overflow-auto p-3" id="chatMessages">
            <div class="text-center text-muted mt-4" id="emptyState">
              <i class="bi bi-chat-square-text" style="font-size:2.5rem;"></i>
              <p class="mt-2">Send a message to start chatting</p>
            </div>
          </div>
          <div class="chat-input-bar border-top bg-white p-2">
            <form id="chatForm" class="d-flex gap-2">
              <input type="text" class="form-control form-control-sm" id="chatInput"
                placeholder="Type a message..." autocomplete="off" required />
              <button type="submit" class="btn btn-primary btn-sm d-flex align-items-center gap-1" id="sendBtn">
                <i class="bi bi-send-fill"></i> Send
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="toast-container">
    <div id="toast" class="toast align-items-center border-0" role="alert">
      <div class="d-flex">
        <div class="toast-body" id="toastBody"></div>
        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/env.js"></script>
  <script src="js/api.js"></script>
  <script src="js/user.js"></script>
</body>
</html>
